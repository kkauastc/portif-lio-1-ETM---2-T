<!DOCTYPE html> <!--oDescreva a linguagem de progmacão que está sendo utilizada, nesse caso HTML -->
<html lang="pt-br"> <!--início do documento-->
<head> <!-- define o cabeçalho do documento. O conteúdo descrito aqui não aparece no navegador. Essa tag serve para inserir folhas de estilos script-->
    <meta charset="UTF-8"> <!--indica o qual será os caracteres (charater set oi charset) será utilizado para renderizar o texto da pagina-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--fornece os metadados do site para o navegador-->
    <title>portifólio</title> <!--títulolo do documento-->
</head> <!--fechamento do cabeçalho de documento-->
<body>
    <!-- um documento HTML é composto por tags que são escritas entre < >. As tags precisam ser abertas e fechadas, o que as diferenciam é que as tags de fechamento possuem uma \ antes do nome.-->
</body>
</html> <!--fim do documento-->
